<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Medhat Ashour — constellation M logo">
  <defs>
    <linearGradient id="line" x1="14" y1="45" x2="50" y2="19" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="40%" r="68%">
      <stop offset="0" stop-color="#0f1c40"/>
      <stop offset="1" stop-color="#070b1c"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#c7ecff" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#22D3EE" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Deep-space badge -->
  <rect width="64" height="64" rx="17" fill="url(#vignette)"/>

  <!-- Distant background stars -->
  <circle cx="11" cy="13" r="0.8" fill="#cfe9ff" opacity="0.6"/>
  <circle cx="54" cy="49" r="0.7" fill="#cfe9ff" opacity="0.5"/>
  <circle cx="52" cy="10" r="0.6" fill="#cfe9ff" opacity="0.5"/>
  <circle cx="14" cy="51" r="0.6" fill="#cfe9ff" opacity="0.45"/>

  <!-- Orbit -->
  <ellipse cx="32" cy="33" rx="23" ry="9" fill="none" stroke="url(#line)" stroke-width="0.8" opacity="0.18" transform="rotate(-22 32 33)"/>

  <!-- Constellation "M" — the initial written in the stars -->
  <path d="M14 45 L21 19 L32 34 L43 19 L50 45"
        fill="none" stroke="url(#line)" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>

  <!-- Star-node halos -->
  <circle cx="14" cy="45" r="3.2" fill="url(#halo)"/>
  <circle cx="21" cy="19" r="4"   fill="url(#halo)"/>
  <circle cx="32" cy="34" r="3.4" fill="url(#halo)"/>
  <circle cx="43" cy="19" r="4.4" fill="url(#halo)"/>
  <circle cx="50" cy="45" r="3.2" fill="url(#halo)"/>

  <!-- Star cores -->
  <circle cx="14" cy="45" r="1.6" fill="#ffffff"/>
  <circle cx="21" cy="19" r="2"   fill="#ffffff"/>
  <circle cx="32" cy="34" r="1.7" fill="#ffffff"/>
  <circle cx="50" cy="45" r="1.6" fill="#ffffff"/>

  <!-- The "idea" star: a bright 4-point twinkle on the brightest node -->
  <path d="M43 12.5 L44.1 17.9 L49.5 19 L44.1 20.1 L43 25.5 L41.9 20.1 L36.5 19 L41.9 17.9 Z"
        fill="#ffffff"/>

  <!-- Glossy sheen for depth -->
  <rect width="64" height="64" rx="17" fill="url(#sheen)"/>
  <!-- Subtle inner bezel -->
  <rect x="1" y="1" width="62" height="62" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
</svg>
