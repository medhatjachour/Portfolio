<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Medhat Ashour - Software Engineer at Microsoft. Portfolio showcasing React, TypeScript, Python projects and technical expertise." />
    <title>Medhat Ashour - Software Engineer @ Microsoft | React, TypeScript, Python</title>
    
    <!-- DNS Prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/profile.png" as="image" type="image/png" fetchpriority="high" />
    
    <!-- Optimized font loading - preload font file directly to eliminate render blocking -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_fvQtMwCp50KnMa1ZL7.woff2" as="font" type="font/woff2" crossorigin />
    
    <!-- Non-blocking font loading with display=optional for instant text rendering -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=optional" rel="stylesheet" media="print" onload="this.media='all'" />
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0a0e27" />
  </head>
